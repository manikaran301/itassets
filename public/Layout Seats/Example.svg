<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1440 560"
  width="1440"
  height="560"
  font-family="Inter, system-ui, sans-serif"
  data-component="workspace-layout"
  data-version="2.0"
  data-layout="cabin-left-grid-right"
>
  <defs>
    <style>
      .desk       { fill: #FFFFFF; stroke: #1a1a1a; stroke-width: 4; }
      .wall       { fill: none; stroke: #1a1a1a; stroke-width: 6; }
      .divider    { fill: none; stroke: #1a1a1a; stroke-width: 5; }
      .cubicle-bg { fill: #F5F5F5; stroke: #1a1a1a; stroke-width: 4; }

      /* Chair parts */
      .chair-back-green   { fill: #8B9E4A; }
      .chair-back-gray    { fill: #8B9E4A; opacity: 0.75; }
      .chair-seat-green   { fill: #2E7D32; }
      .chair-seat-gray    { fill: #555555; }
      .chair-arm          { fill: #1a1a1a; }

      .badge-bg   { fill: #FFFFFF; stroke: #CCCCCC; stroke-width: 1; }
      .badge-text { font-size: 10px; font-weight: 600; fill: #222222; }
      .emp-label  { font-size: 9px; font-weight: 500; fill: #555555; }
      .status-pip-vacant   { fill: #16A34A; }
      .status-pip-occupied { fill: #525252; }
      .status-pip-selected { fill: #2563EB; }
      .status-pip-reserved { fill: #EA580C; }
      .status-pip-disabled { fill: #9CA3AF; }
    </style>

    <!--
      CHAIR SYMBOLS
      Two orientations:
        chair-down  = back at top, person faces downward  (top row)
        chair-up    = back at bottom, person faces upward (bottom row)
        chair-left  = back at right, person faces left    (manager cabin)
    -->

    <!-- Chair facing DOWN (top row of cubicles) — gray/occupied style -->
    <symbol id="chair-down-gray" viewBox="0 0 80 90">
      <!-- back -->
      <rect x="8" y="0" width="64" height="34" rx="10" class="chair-back-gray" data-part="chair-back"/>
      <!-- seat -->
      <rect x="4" y="28" width="72" height="50" rx="18" class="chair-seat-gray" data-part="seat-base"/>
      <!-- arms -->
      <rect x="0" y="32" width="10" height="36" rx="5" class="chair-arm" data-part="arm-left"/>
      <rect x="70" y="32" width="10" height="36" rx="5" class="chair-arm" data-part="arm-right"/>
    </symbol>

    <!-- Chair facing UP (bottom row of cubicles) — gray/occupied style -->
    <symbol id="chair-up-gray" viewBox="0 0 80 90">
      <!-- seat -->
      <rect x="4" y="12" width="72" height="50" rx="18" class="chair-seat-gray" data-part="seat-base"/>
      <!-- arms -->
      <rect x="0" y="22" width="10" height="36" rx="5" class="chair-arm" data-part="arm-left"/>
      <rect x="70" y="22" width="10" height="36" rx="5" class="chair-arm" data-part="arm-right"/>
      <!-- back -->
      <rect x="8" y="56" width="64" height="34" rx="10" class="chair-back-gray" data-part="chair-back"/>
    </symbol>

    <!-- Chair facing RIGHT (manager, facing into cabin) — green style -->
    <symbol id="chair-right-green" viewBox="0 0 90 80">
      <!-- seat -->
      <rect x="12" y="4" width="50" height="72" rx="18" class="chair-seat-green" data-part="seat-base"/>
      <!-- arms -->
      <rect x="22" y="0" width="36" height="10" rx="5" class="chair-arm" data-part="arm-top"/>
      <rect x="22" y="70" width="36" height="10" rx="5" class="chair-arm" data-part="arm-bottom"/>
      <!-- back -->
      <rect x="56" y="8" width="34" height="64" rx="10" class="chair-back-green" data-part="chair-back"/>
    </symbol>

  </defs>

  <!-- ═══════════════════════════════════════
       FLOOR BACKGROUND
  ════════════════════════════════════════ -->
  <rect width="1440" height="560" fill="#FFFFFF" data-layer="floor-bg"/>

  <!-- ═══════════════════════════════════════
       MANAGER CABIN (left)
       Approx: x=60 y=100  w=220 h=300
  ════════════════════════════════════════ -->
  <g id="zone-cabin"
     data-zone="cabin"
     data-zone-label="Manager Cabin"
     data-seat-count="1">

    <!-- Cabin walls -->
    <rect x="60" y="110" width="220" height="280" rx="0"
          fill="#FAFAFA" stroke="#1a1a1a" stroke-width="5"
          data-layer="cabin-wall"/>

    <!-- Desk (L-shape approximated as rect) -->
    <rect x="80" y="200" width="160" height="80" rx="4" class="desk"
          data-part="desk"/>
    <rect x="80" y="200" width="60" height="140" rx="4" class="desk"
          data-part="desk-return"/>

    <!-- Manager seat — facing right (into cabin) -->
    <g id="seat-MGR-01"
       data-seat-id="MGR-01"
       data-status="occupied"
       data-employee="Manager"
       data-department="Management"
       data-x="100" data-y="210"
       data-rotation="90"
       transform="translate(90, 205)">
      <use href="#chair-right-green" width="90" height="80"/>
      <!-- seat number badge -->
      <rect x="0" y="-18" width="54" height="16" rx="8" class="badge-bg" data-part="seat-number-badge"/>
      <text x="27" y="-6" text-anchor="middle" class="badge-text" data-part="seat-number">MGR-01</text>
      <!-- status pip -->
      <circle cx="82" cy="4" r="5" class="status-pip-occupied" data-part="status-pip"/>
    </g>

    <!-- Zone label -->
    <text x="170" y="148" text-anchor="middle" font-size="11" font-weight="600"
          fill="#555555" letter-spacing="0.06em" data-layer="zone-label">MANAGER</text>
  </g>

  <!-- ═══════════════════════════════════════
       MAIN GRID OUTER FRAME
       Starts x=300, spans 4 columns × 2 rows
       Each cubicle: 270w × 220h
  ════════════════════════════════════════ -->
  <g id="zone-open-floor"
     data-zone="open-floor"
     data-zone-label="Open Floor"
     data-seat-count="8">

    <!-- Outer bounding wall -->
    <rect x="300" y="80" width="1100" height="440"
          fill="none" stroke="#1a1a1a" stroke-width="6"
          data-layer="grid-outer-wall"/>

    <!-- Horizontal center divider (between row 1 and row 2) -->
    <line x1="300" y1="300" x2="1400" y2="300"
          stroke="#1a1a1a" stroke-width="5" data-layer="grid-divider-h"/>

    <!-- Vertical dividers (3 internal = 4 columns) -->
    <line x1="575"  y1="80"  x2="575"  y2="520" stroke="#1a1a1a" stroke-width="5" data-layer="grid-divider-v1"/>
    <line x1="850"  y1="80"  x2="850"  y2="520" stroke="#1a1a1a" stroke-width="5" data-layer="grid-divider-v2"/>
    <line x1="1125" y1="80"  x2="1125" y2="520" stroke="#1a1a1a" stroke-width="5" data-layer="grid-divider-v3"/>

    <!--
      ROW 1 — chairs face DOWN (back at top)
      Cubicle centers approx x: 437, 712, 987, 1262 | y: 80–300
    -->

    <!-- Seat A-101 — col 1 row 1 -->
    <g id="seat-A-101"
       data-seat-id="A-101"
       data-status="occupied"
       data-employee="Rahul Sharma"
       data-department="Engineering"
       data-row="1" data-col="1"
       data-x="397" data-y="130"
       data-rotation="0"
       transform="translate(397, 120)">
      <!-- desk surface -->
      <rect x="-60" y="90" width="140" height="60" rx="4" class="desk" data-part="desk"/>
      <!-- chair -->
      <use href="#chair-down-gray" x="-40" y="0" width="80" height="90" data-part="chair"/>
      <!-- badge -->
      <rect x="-30" y="-18" width="60" height="16" rx="8" class="badge-bg" data-part="seat-number-badge"/>
      <text x="0" y="-6" text-anchor="middle" class="badge-text" data-part="seat-number">A-101</text>
      <!-- status pip -->
      <circle cx="52" cy="10" r="5" class="status-pip-occupied" data-part="status-pip"/>
      <!-- employee label -->
      <text x="0" y="165" text-anchor="middle" class="emp-label" data-part="employee-label">Rahul Sharma</text>
    </g>

    <!-- Seat A-102 — col 2 row 1 -->
    <g id="seat-A-102"
       data-seat-id="A-102"
       data-status="occupied"
       data-employee="Priya Mehta"
       data-department="Engineering"
       data-row="1" data-col="2"
       data-x="672" data-y="130"
       transform="translate(672, 120)">
      <rect x="-60" y="90" width="140" height="60" rx="4" class="desk" data-part="desk"/>
      <use href="#chair-down-gray" x="-40" y="0" width="80" height="90" data-part="chair"/>
      <rect x="-30" y="-18" width="60" height="16" rx="8" class="badge-bg" data-part="seat-number-badge"/>
      <text x="0" y="-6" text-anchor="middle" class="badge-text" data-part="seat-number">A-102</text>
      <circle cx="52" cy="10" r="5" class="status-pip-occupied" data-part="status-pip"/>
      <text x="0" y="165" text-anchor="middle" class="emp-label" data-part="employee-label">Priya Mehta</text>
    </g>

    <!-- Seat A-103 — col 3 row 1 -->
    <g id="seat-A-103"
       data-seat-id="A-103"
       data-status="vacant"
       data-employee=""
       data-department="Engineering"
       data-row="1" data-col="3"
       data-x="947" data-y="130"
       transform="translate(947, 120)">
      <rect x="-60" y="90" width="140" height="60" rx="4" class="desk" data-part="desk"/>
      <use href="#chair-down-gray" x="-40" y="0" width="80" height="90" data-part="chair"/>
      <rect x="-30" y="-18" width="60" height="16" rx="8" class="badge-bg" data-part="seat-number-badge"/>
      <text x="0" y="-6" text-anchor="middle" class="badge-text" data-part="seat-number">A-103</text>
      <circle cx="52" cy="10" r="5" class="status-pip-vacant" data-part="status-pip"/>
    </g>

    <!-- Seat A-104 — col 4 row 1 -->
    <g id="seat-A-104"
       data-seat-id="A-104"
       data-status="occupied"
       data-employee="Arjun Nair"
       data-department="Engineering"
       data-row="1" data-col="4"
       data-x="1222" data-y="130"
       transform="translate(1222, 120)">
      <rect x="-60" y="90" width="140" height="60" rx="4" class="desk" data-part="desk"/>
      <use href="#chair-down-gray" x="-40" y="0" width="80" height="90" data-part="chair"/>
      <rect x="-30" y="-18" width="60" height="16" rx="8" class="badge-bg" data-part="seat-number-badge"/>
      <text x="0" y="-6" text-anchor="middle" class="badge-text" data-part="seat-number">A-104</text>
      <circle cx="52" cy="10" r="5" class="status-pip-occupied" data-part="status-pip"/>
      <text x="0" y="165" text-anchor="middle" class="emp-label" data-part="employee-label">Arjun Nair</text>
    </g>

    <!--
      ROW 2 — chairs face UP (back at bottom)
      y baseline: 300–520, chair sits near bottom of cubicle
    -->

    <!-- Seat A-105 — col 1 row 2 -->
    <g id="seat-A-105"
       data-seat-id="A-105"
       data-status="reserved"
       data-employee=""
       data-department="HR"
       data-row="2" data-col="1"
       data-x="397" data-y="360"
       transform="translate(397, 330)">
      <!-- desk at top of cubicle -->
      <rect x="-60" y="0" width="140" height="60" rx="4" class="desk" data-part="desk"/>
      <!-- chair below desk, facing up -->
      <use href="#chair-up-gray" x="-40" y="70" width="80" height="90" data-part="chair"/>
      <!-- badge -->
      <rect x="-30" y="-18" width="60" height="16" rx="8" class="badge-bg" data-part="seat-number-badge"/>
      <text x="0" y="-6" text-anchor="middle" class="badge-text" data-part="seat-number">A-105</text>
      <circle cx="52" cy="80" r="5" class="status-pip-reserved" data-part="status-pip"/>
    </g>

    <!-- Seat A-106 — col 2 row 2 -->
    <g id="seat-A-106"
       data-seat-id="A-106"
       data-status="occupied"
       data-employee="Sneha Pillai"
       data-department="Engineering"
       data-row="2" data-col="2"
       data-x="672" data-y="360"
       transform="translate(672, 330)">
      <rect x="-60" y="0" width="140" height="60" rx="4" class="desk" data-part="desk"/>
      <use href="#chair-up-gray" x="-40" y="70" width="80" height="90" data-part="chair"/>
      <rect x="-30" y="-18" width="60" height="16" rx="8" class="badge-bg" data-part="seat-number-badge"/>
      <text x="0" y="-6" text-anchor="middle" class="badge-text" data-part="seat-number">A-106</text>
      <circle cx="52" cy="80" r="5" class="status-pip-occupied" data-part="status-pip"/>
      <text x="0" y="170" text-anchor="middle" class="emp-label" data-part="employee-label">Sneha Pillai</text>
    </g>

    <!-- Seat A-107 — col 3 row 2 -->
    <g id="seat-A-107"
       data-seat-id="A-107"
       data-status="occupied"
       data-employee="Devika Rao"
       data-department="Engineering"
       data-row="2" data-col="3"
       data-x="947" data-y="360"
       transform="translate(947, 330)">
      <rect x="-60" y="0" width="140" height="60" rx="4" class="desk" data-part="desk"/>
      <use href="#chair-up-gray" x="-40" y="70" width="80" height="90" data-part="chair"/>
      <rect x="-30" y="-18" width="60" height="16" rx="8" class="badge-bg" data-part="seat-number-badge"/>
      <text x="0" y="-6" text-anchor="middle" class="badge-text" data-part="seat-number">A-107</text>
      <circle cx="52" cy="80" r="5" class="status-pip-occupied" data-part="status-pip"/>
      <text x="0" y="170" text-anchor="middle" class="emp-label" data-part="employee-label">Devika Rao</text>
    </g>

    <!-- Seat A-108 — col 4 row 2 -->
    <g id="seat-A-108"
       data-seat-id="A-108"
       data-status="vacant"
       data-employee=""
       data-department="HR"
       data-row="2" data-col="4"
       data-x="1222" data-y="360"
       transform="translate(1222, 330)">
      <rect x="-60" y="0" width="140" height="60" rx="4" class="desk" data-part="desk"/>
      <use href="#chair-up-gray" x="-40" y="70" width="80" height="90" data-part="chair"/>
      <rect x="-30" y="-18" width="60" height="16" rx="8" class="badge-bg" data-part="seat-number-badge"/>
      <text x="0" y="-6" text-anchor="middle" class="badge-text" data-part="seat-number">A-108</text>
      <circle cx="52" cy="80" r="5" class="status-pip-vacant" data-part="status-pip"/>
    </g>

  </g><!-- /zone-open-floor -->

  <!-- ═══════════════════════════════════════
       LEGEND (bottom left)
  ════════════════════════════════════════ -->
  <g id="legend" data-component="legend" transform="translate(60, 420)">
    <rect x="0" y="0" width="216" height="110" rx="10"
          fill="#FAFAFA" stroke="#CCCCCC" stroke-width="1"
          data-layer="legend-bg"/>
    <text x="12" y="20" font-size="10" font-weight="700" fill="#333" letter-spacing="0.07em">LEGEND</text>

    <circle cx="20" cy="38" r="6" class="status-pip-occupied"/>
    <text x="32" y="43" font-size="10" fill="#333" data-status="occupied">Occupied</text>

    <circle cx="20" cy="58" r="6" class="status-pip-vacant"/>
    <text x="32" y="63" font-size="10" fill="#333" data-status="vacant">Vacant</text>

    <circle cx="20" cy="78" r="6" class="status-pip-reserved"/>
    <text x="32" y="83" font-size="10" fill="#333" data-status="reserved">Reserved</text>

    <circle cx="110" cy="38" r="6" class="status-pip-selected"/>
    <text x="122" y="43" font-size="10" fill="#333" data-status="selected">Selected</text>

    <circle cx="110" cy="58" r="6" class="status-pip-disabled"/>
    <text x="122" y="63" font-size="10" fill="#333" data-status="disabled">Disabled</text>
  </g>

</svg>
